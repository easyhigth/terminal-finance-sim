name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Installer ruff et mypy
        run: pip install ruff mypy
      - name: Lancer ruff
        run: ruff check .
      - name: Lancer mypy (périmètre graduel, cf. pyproject.toml)
        run: mypy

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Installer les dépendances de test
        # pygame est requis depuis l'ajout du test de fumée des scènes
        # (tests/test_scene_smoke.py), exécuté en mode headless (SDL dummy).
        run: pip install numpy scipy pytest pygame hypothesis
      - name: Lancer pytest
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest

  screenshots:
    # Fumée du harnais de captures : chaque écran capturé doit se rendre
    # sans lever (a déjà attrapé un crash de scrollbar). Les images ne sont
    # PAS committées ici — juste exposées en artefact pour inspection.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Installer les dépendances
        run: pip install numpy scipy pygame
      - name: Générer les captures (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python scripts/make_screenshots.py
      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots/*.png
          retention-days: 14
