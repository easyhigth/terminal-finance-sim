name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Installer ruff et mypy
        run: pip install ruff mypy
      - name: Lancer ruff
        run: ruff check .
      - name: Lancer mypy (périmètre graduel, cf. pyproject.toml)
        run: mypy

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Installer les dépendances de test
        # pygame est requis depuis l'ajout du test de fumée des scènes
        # (tests/test_scene_smoke.py), exécuté en mode headless (SDL dummy).
        run: pip install numpy scipy pytest pygame hypothesis
      - name: Lancer pytest
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: pytest
